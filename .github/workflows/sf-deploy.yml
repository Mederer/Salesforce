name: Salesforce Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install sfdx-git-delta
        run: echo 'y' | sf plugins install sfdx-git-delta

      - name: Write JWT key
        run: echo "${{ secrets.SF_JWT_KEY }}" > server.key

      - name: Authenticate to Production
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CONSUMER_KEY }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias prod-org

      - name: Remove JWT key
        if: always()
        run: rm -f server.key

      - name: Generate delta
        run: |
          mkdir -p delta
          sf sgd source delta \
            --to HEAD \
            --from origin/main \
            --output delta \
            --generate-delta \
            --source-dir force-app

      - name: Validate delta (check-only)
        run: |
          DESTRUCTIVE=""
          if [ -f delta/destructiveChanges/destructiveChanges.xml ]; then
            DESTRUCTIVE="--post-destructive-changes delta/destructiveChanges/destructiveChanges.xml"
          fi
          sf project deploy start \
            --target-org prod-org \
            --manifest delta/package/package.xml \
            $DESTRUCTIVE \
            --test-level RunLocalTests \
            --dry-run \
            --wait 30

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Salesforce CLI
        run: npm install -g @salesforce/cli

      - name: Install sfdx-git-delta
        run: echo 'y' | sf plugins install sfdx-git-delta

      - name: Write JWT key
        run: echo "${{ secrets.SF_JWT_KEY }}" > server.key

      - name: Authenticate to Production
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CONSUMER_KEY }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_INSTANCE_URL }}" \
            --alias prod-org

      - name: Remove JWT key
        if: always()
        run: rm -f server.key

      - name: Generate delta
        run: |
          mkdir -p delta
          sf sgd source delta \
            --to HEAD \
            --from origin/main \
            --output delta \
            --generate-delta \
            --source-dir force-app

      - name: Deploy delta
        run: |
          DESTRUCTIVE=""
          if [ -f delta/destructiveChanges/destructiveChanges.xml ]; then
            DESTRUCTIVE="--post-destructive-changes delta/destructiveChanges/destructiveChanges.xml"
          fi
          sf project deploy start \
            --target-org prod-org \
            --manifest delta/package/package.xml \
            $DESTRUCTIVE \
            --test-level RunLocalTests \
            --wait 30